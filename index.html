<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Hour Shift Task Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        /* Input Form Styles */
        .tech-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 5px;}
        input[type="text"], select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; flex: 1; }
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: #2980b9; }
        .btn-add { background-color: #2ecc71; margin-bottom: 20px; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-remove { background-color: #e74c3c; flex: 0; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: center; }
        th, td { border: 1px solid #000; padding: 8px; }
        .header-yellow { background-color: #ffff00; color: #000; font-weight: bold; font-size: 16px; padding: 10px;}
        .header-red { background-color: #c00000; color: #fff; font-weight: bold; }
        td:first-child { font-weight: bold; background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>12-Hour Workforce Roster</h2>
    
    <div id="roster-container">
        <!-- Tech inputs will be added here dynamically -->
    </div>
    
    <button class="btn btn-add" onclick="addTechRow()">+ Add Team Member</button>
    <button class="btn" onclick="generateTable()">Generate 12-Hour Schedule</button>

    <table id="scheduleTable" style="display:none;">
        <thead>
            <tr>
                <th colspan="7" class="header-yellow">New Task Assignment</th>
            </tr>
            <tr>
                <th class="header-red">Manila Time</th>
                <th class="header-red">CRITICAL TASK</th>
                <th class="header-red">ITOPS DL & TEAMS</th>
                <th class="header-red">WARNING TASK</th>
                <th class="header-red">CBSNET</th>
                <th class="header-red">CALENDAR TASK</th>
                <th class="header-red">BREAK AND OTHERS</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Rows generated by Javascript -->
        </tbody>
    </table>
</div>

<script>
    // Time options for the dropdowns
    const hours = ["00:00", "01:00", "02:00", "03:00", "04:00", "05:00", "06:00", "07:00", "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"];
    
    function createOptions() {
        return hours.map((h, i) => `<option value="${i}">${h}</option>`).join('');
    }

    function addTechRow() {
        const container = document.getElementById('roster-container');
        const div = document.createElement('div');
        div.className = 'tech-row';
        div.innerHTML = `
            <input type="text" placeholder="Tech Name" class="tech-name">
            <label>Start:</label><select class="tech-start">${createOptions()}</select>
            <label>End:</label><select class="tech-end">${createOptions()}</select>
            <label>Break:</label><select class="tech-break">${createOptions()}</select>
            <button class="btn btn-remove" onclick="this.parentElement.remove()">X</button>
        `;
        container.appendChild(div);
    }

    // Add 3 default rows to start
    window.onload = () => { addTechRow(); addTechRow(); addTechRow(); };

    function formatAMPM(hour) {
        let ampm = hour >= 12 ? 'PM' : 'AM';
        let h = hour % 12;
        h = h ? h : 12; 
        return `${h} ${ampm}`;
    }

    function generateTable() {
        document.getElementById('scheduleTable').style.display = 'table';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // Clear old data

        // Gather all inputted tech data
        const rows = document.querySelectorAll('.tech-row');
        let staff = [];
        rows.forEach(row => {
            let name = row.querySelector('.tech-name').value;
            if (name) {
                staff.push({
                    name: name,
                    start: parseInt(row.querySelector('.tech-start').value),
                    end: parseInt(row.querySelector('.tech-end').value),
                    breakHr: parseInt(row.querySelector('.tech-break').value)
                });
            }
        });

        // Generate exactly 12 hours starting from 6 AM
        for (let i = 0; i < 12; i++) {
            let currentHour = (i + 6) % 24;
            let nextHour = (currentHour + 1) % 24;
            let timeLabel = `${formatAMPM(currentHour)} - ${formatAMPM(nextHour)}`;

            let activeTechs = [];
            let breakTechs = [];

            // Determine who is on shift and who is on break for this specific hour
            staff.forEach(tech => {
                let isOnShift = false;
                if (tech.start <= tech.end) {
                    isOnShift = currentHour >= tech.start && currentHour < tech.end;
                } else {
                    isOnShift = currentHour >= tech.start || currentHour < tech.end;
                }

                if (isOnShift) {
                    if (currentHour === tech.breakHr) {
                        breakTechs.push(tech.name);
                    } else {
                        activeTechs.push(tech.name);
                    }
                }
            });

            // Mathematical Rolling Rotation based on current hour
            let tasks = ["", "", "", "", ""]; // [Critical, ITOPS, Warning, CBSNET, Calendar]
            if (activeTechs.length > 0) {
                // Shift the array so the tasks rotate every hour
                let offset = currentHour % activeTechs.length;
                let rotatedTechs = activeTechs.slice(offset).concat(activeTechs.slice(0, offset));
                
                // Distribute tasks like dealing cards
                for(let t = 0; t < 5; t++) {
                    tasks[t] = rotatedTechs[t % rotatedTechs.length];
                }
            }

            // Build the HTML row
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${timeLabel}</td>
                <td>${tasks[0]}</td>
                <td>${tasks[1]}</td>
                <td>${tasks[2]}</td>
                <td>${tasks[3]}</td>
                <td>${tasks[4]}</td>
                <td>${breakTechs.join(', ')}</td>
            `;
            tbody.appendChild(tr);
        }
    }
</script>

</body>
</html>
