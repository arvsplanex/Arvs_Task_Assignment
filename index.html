<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITOPS Shift Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        /* Input Form Styles */
        .tech-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 5px; flex-wrap: wrap; }
        input[type="text"], select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; flex: 1; min-width: 80px;}
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: #2980b9; }
        .btn-add { background-color: #2ecc71; margin-bottom: 20px; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-remove { background-color: #e74c3c; flex: 0; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: center; }
        th, td { border: 1px solid #000; padding: 8px; }
        .header-yellow { background-color: #ffff00; color: #000; font-weight: bold; font-size: 16px; padding: 10px;}
        .header-red { background-color: #c00000; color: #fff; font-weight: bold; }
        td:first-child { font-weight: bold; background-color: #f8f9fa; white-space: nowrap;}
    </style>
</head>
<body>

<div class="container">
    <h2>IT OPS TASK ASSIGNMENT AUTOMATION(Smart Rotation)</h2>
    
    <div id="roster-container">
        <!-- Tech inputs will be added here dynamically -->
    </div>
    
    <button class="btn btn-add" onclick="addTechRow()">+ Add Team Member</button>
    <button class="btn" onclick="generateTable()">Generate 24-Hour Schedule</button>

    <table id="scheduleTable" style="display:none;">
        <thead>
            <tr>
                <th colspan="7" class="header-yellow">Task Assignment</th>
            </tr>
            <tr>
                <th class="header-red">Manila Time</th>
                <th class="header-red">CRITICAL TASK</th>
                <th class="header-red">ITOPS DL & TEAMS</th>
                <th class="header-red">WARNING TASK</th>
                <th class="header-red">CBSNET</th>
                <th class="header-red">CALENDAR TASK</th>
                <th class="header-red">BREAK AND OTHERS</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Rows generated by Javascript -->
        </tbody>
    </table>
</div>

<script>
    function formatAMPM(hour) {
        let ampm = hour >= 12 ? 'PM' : 'AM';
        let h = hour % 12;
        h = h ? h : 12; 
        return `${h} ${ampm}`;
    }

    // Standard 24-hour options for Start dropdown
    function createOptions() {
        let options = '';
        for (let i = 0; i < 24; i++) {
            options += `<option value="${i}">${formatAMPM(i)}</option>`;
        }
        return options;
    }

    // NEW: Updates End options to ONLY show 4 to 11 hours after Start
    function updateEndOptions(startSelect) {
        const startHour = parseInt(startSelect.value);
        const row = startSelect.closest('.tech-row');
        const endSelect = row.querySelector('.tech-end');
        
        // Save current end value if it exists so it doesn't always reset when changing start
        let currentEnd = endSelect.value;
        let options = '';
        
        for (let i = 4; i <= 11; i++) {
            let h = (startHour + i) % 24;
            options += `<option value="${h}">${formatAMPM(h)}</option>`;
        }
        endSelect.innerHTML = options;
        
        // Push the update to the Break/Special dropdowns
        updateBreakSpecialOptions(row);
    }

    // NEW: Updates Break/Special to ONLY show hours within the shift
    function updateBreakSpecialOptions(row) {
        const startHour = parseInt(row.querySelector('.tech-start').value);
        const endHour = parseInt(row.querySelector('.tech-end').value);
        const breakSelect = row.querySelector('.tech-break');
        const specialSelect = row.querySelector('.tech-special');
        
        // Calculate shift duration in hours
        let shiftLength = (endHour - startHour + 24) % 24;
        if (shiftLength === 0) shiftLength = 24; // Failsafe

        let options = `<option value="-1">--</option>`;
        
        // Generate options strictly within shift (exclusive of the final End hour)
        for (let i = 0; i < shiftLength; i++) {
            let h = (startHour + i) % 24;
            options += `<option value="${h}">${formatAMPM(h)}</option>`;
        }
        
        // Save current values if they are still valid, otherwise it resets to "--"
        let curBreak = breakSelect.value;
        let curSpecial = specialSelect.value;
        
        breakSelect.innerHTML = options;
        specialSelect.innerHTML = options;
        
        if([...breakSelect.options].some(o => o.value === curBreak)) breakSelect.value = curBreak;
        if([...specialSelect.options].some(o => o.value === curSpecial)) specialSelect.value = curSpecial;
    }

    function addTechRow() {
        const container = document.getElementById('roster-container');
        const div = document.createElement('div');
        div.className = 'tech-row';
        div.innerHTML = `
            <input type="text" placeholder="Tech Name" class="tech-name">
            <label>Start:</label><select class="tech-start" onchange="updateEndOptions(this)">${createOptions()}</select>
            <label>End:</label><select class="tech-end" onchange="updateBreakSpecialOptions(this.closest('.tech-row'))"></select>
            <label>Break (1h):</label><select class="tech-break"></select>
            <label>Special (1h):</label><select class="tech-special"></select>
            <button class="btn btn-remove" onclick="this.parentElement.remove()">X</button>
        `;
        container.appendChild(div);
        
        // Initialize dynamic dropdowns for this new row
        updateEndOptions(div.querySelector('.tech-start'));
    }

    // Add 4 default rows to start
    window.onload = () => { addTechRow(); addTechRow(); addTechRow(); addTechRow(); };

    function generateTable() {
        // --- CONFLICT CHECKER ---
        const rows = document.querySelectorAll('.tech-row');
        let staff = [];
        let offTimes = {}; 
        let conflictFound = false;
        let conflictMsg = "";

        rows.forEach(row => {
            let name = row.querySelector('.tech-name').value;
            if (name) {
                let brk = parseInt(row.querySelector('.tech-break').value);
                let spec = parseInt(row.querySelector('.tech-special').value);
                
                [brk, spec].forEach(hr => {
                    if (hr !== -1) {
                        if (!offTimes[hr]) offTimes[hr] = [];
                        offTimes[hr].push(name);
                    }
                });

                staff.push({
                    name: name,
                    start: parseInt(row.querySelector('.tech-start').value),
                    end: parseInt(row.querySelector('.tech-end').value),
                    breakHr: brk,
                    specialHr: spec
                });
            }
        });

        for (let hour in offTimes) {
            if (offTimes[hour].length > 1) {
                conflictFound = true;
                conflictMsg += `\n- ${offTimes[hour].join(" and ")} at ${formatAMPM(parseInt(hour))}`;
            }
        }

        if (conflictFound) {
            alert("⚠️ HEADS UP! Double-Booking Detected:\nMultiple techs are scheduled for a Break or Special Task at the same time:" + conflictMsg + "\n\nPlease adjust the times to ensure coverage.");
            return; 
        }

        // --- GENERATE TABLE ---
        document.getElementById('scheduleTable').style.display = 'table';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 

        for (let i = 0; i < 24; i++) {
            let currentHour = (i + 6) % 24;
            let nextHour = (currentHour + 1) % 24;
            let timeLabel = `${formatAMPM(currentHour)} - ${formatAMPM(nextHour)}`;

            let activeTechs = [];
            let offTechs = [];

            staff.forEach(tech => {
                let isOnShift = false;
                if (tech.start <= tech.end) {
                    isOnShift = currentHour >= tech.start && currentHour < tech.end;
                } else {
                    isOnShift = currentHour >= tech.start || currentHour < tech.end;
                }

                if (isOnShift) {
                    if (currentHour === tech.breakHr || currentHour === tech.specialHr) {
                        offTechs.push(tech.name);
                    } else {
                        activeTechs.push(tech.name);
                    }
                }
            });

            let tCrit = "", tItops = "", tWarn = "", tCbs = "", tCal = "";

            if (activeTechs.length > 0) {
                let offset = currentHour % activeTechs.length;
                let rotatedTechs = activeTechs.slice(offset).concat(activeTechs.slice(0, offset));
                
                tCrit = rotatedTechs[0];
                tItops = rotatedTechs[0];

                if (rotatedTechs.length === 1) {
                    tWarn = rotatedTechs[0]; tCbs = rotatedTechs[0]; tCal = rotatedTechs[0];
                } 
                else if (rotatedTechs.length === 2) {
                    tWarn = rotatedTechs[1]; tCbs = rotatedTechs[1]; tCal = rotatedTechs[1];
                } 
                else if (rotatedTechs.length === 3) {
                    tWarn = rotatedTechs[1]; tCbs = rotatedTechs[2]; tCal = rotatedTechs[2];
                } 
                else {
                    tWarn = rotatedTechs[1]; tCbs = rotatedTechs[2]; tCal = rotatedTechs[3];
                    for (let j = 4; j < rotatedTechs.length; j++) {
                        offTechs.push(rotatedTechs[j]);
                    }
                }
            }

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${timeLabel}</td>
                <td>${tCrit}</td>
                <td>${tItops}</td>
                <td>${tWarn}</td>
                <td>${tCbs}</td>
                <td>${tCal}</td>
                <td>${offTechs.join(', ')}</td>
            `;
            tbody.appendChild(tr);
        }
    }
</script>

</body>
</html>
